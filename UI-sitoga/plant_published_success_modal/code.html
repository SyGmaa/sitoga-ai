<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plant Published Success Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1f8825", "background-light": "#f6f8f6", "background-dark": "#131f13"}, fontFamily: {display: "Manrope"}, borderRadius: {DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px"}, backgroundImage: {"gradient-radial": "radial-gradient(var(--tw-gradient-stops))"}}}};</script>
<style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes float-reverse {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-reverse {
            animation: float-reverse 7s ease-in-out infinite;
        }
        .leaf-particle {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Background Admin Panel (Blurred Context) -->
<div aria-hidden="true" class="relative flex h-screen w-full flex-col overflow-hidden blur-sm brightness-95 transition-all duration-300 pointer-events-none select-none">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-8 text-primary">
<span class="material-symbols-outlined text-[32px]">spa</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Admin Kebun Raya</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-xl size-10 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">notifications</span>
</button>
<button class="flex items-center justify-center rounded-xl size-10 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
</div>
<div class="bg-center bg-no-repeat bg-cover rounded-full size-10 ring-2 ring-white dark:ring-slate-800" data-alt="User Avatar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA7HFpM2rTpzS5bINw5o64DV0R_zKZ3Si8u8USxdDYNqA-gMHIfSjy_cMFNy7owsnU2X7Chi4YU_AQd1pswxlPR1312tyAZmuBUmDsvDlf-gcsAKfCQG1HpTUzYPuuNI4ltypI-AKqtFJ6XOHohM0CTveIzydhA7f6SDk987EJVB0Ujo-ewiEggkGXTU-myHg-TVC-MP9wt0EeHnY5leMFeMomSq3gU2UgwfeICl7J_w1DkFF3NTwAkG3peDLlrKr2_JXHBUy_7CQ");'></div>
</div>
</header>
<!-- Dummy Dashboard Content -->
<div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4 mt-8 opacity-50">
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm h-32 w-full"></div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm h-32 w-full"></div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm h-32 w-full"></div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm h-64 w-full md:col-span-2"></div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-sm h-64 w-full"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
<!-- Backdrop -->
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity"></div>
<!-- Leaf Particles Decoration (Absolute positioned relative to viewport or modal container) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<!-- Top Left Leaf -->
<div class="absolute top-1/4 left-1/4 -translate-x-20 -translate-y-20 animate-float">
<svg class="text-primary/40 leaf-particle transform rotate-45" fill="currentColor" height="120" viewbox="0 0 24 24" width="120">
<path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"></path>
</svg>
</div>
<!-- Bottom Right Leaf -->
<div class="absolute bottom-1/4 right-1/4 translate-x-20 translate-y-20 animate-float-reverse">
<svg class="text-primary/30 leaf-particle transform -rotate-12" fill="currentColor" height="100" viewbox="0 0 24 24" width="100">
<path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"></path>
</svg>
</div>
<!-- Top Right Small Leaf -->
<div class="absolute top-1/3 right-1/3 translate-x-32 -translate-y-10 animate-float" style="animation-delay: 1s;">
<svg class="text-emerald-500/30 leaf-particle transform rotate-90" fill="currentColor" height="60" viewbox="0 0 24 24" width="60">
<path d="M12,2C12,2 11,8 6,10.5C11,13 12,19 12,19C12,19 13,13 18,10.5C13,8 12,2 12,2Z"></path>
</svg>
</div>
<!-- Bottom Left Small Leaf -->
<div class="absolute bottom-1/3 left-1/3 -translate-x-32 translate-y-10 animate-float-reverse" style="animation-delay: 1.5s;">
<svg class="text-emerald-400/40 leaf-particle transform -rotate-45" fill="currentColor" height="80" viewbox="0 0 24 24" width="80">
<path d="M2,22C2,22 4.5,12 11,8C11,8 8,11 8,16C8,21 2,22 2,22M22,2C22,2 14,4.5 9,11C9,11 11.5,9 16,9C20.5,9 22,2 22,2Z"></path>
</svg>
</div>
</div>
<!-- Modal Content Card -->
<div class="relative w-full max-w-md bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border border-white/50 dark:border-slate-700 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] p-8 transform transition-all scale-100 flex flex-col items-center text-center z-10">
<!-- Success Icon Circle -->
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl animate-pulse"></div>
<div class="relative bg-gradient-to-br from-[#13ec37] to-emerald-500 rounded-full size-20 flex items-center justify-center shadow-lg shadow-emerald-500/30">
<span class="material-symbols-outlined text-white text-[48px] font-bold">check</span>
</div>
</div>
<!-- Text Content -->
<h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-3">
                Tanaman Berhasil Dipublikasikan!
            </h2>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed mb-8 max-w-[280px] mx-auto">
                Data tanaman baru kini tersimpan di database dan dapat diakses oleh publik.
            </p>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 w-full">
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-[#0fd630] text-slate-900 font-bold py-3.5 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">visibility</span>
                    Lihat Tanaman
                </button>
<!-- Secondary Action -->
<button class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold py-3.5 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">dashboard</span>
                    Kembali ke Dashboard
                </button>
</div>
</div>
</div>
</body></html>
